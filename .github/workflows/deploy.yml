name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main          # Si attiva ad ogni push su main
  workflow_dispatch:  # Permette anche l'avvio manuale dalla UI di GitHub

permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploy paralleli: se spingi due volte di fila,
# il secondo aspetta che il primo finisca
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive   # necessario se usi temi come submoduli

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.0"
          extended: true

      - name: Build site
        run: hugo --minify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
