baseURL = "https://msmbrc.github.io/"
title   = "MSMBRC"

# ── Multilingua ────────────────────────────────────────────────
defaultContentLanguage = "it"
defaultContentLanguageInSubdir = false

[languages]
  [languages.it]
    languageCode = "it-IT"
    languageName = "Italiano"
    weight       = 1
    [languages.it.params]
      bio       = "Designer, videogiocatore, lettore e smanettone."
      langLabel = "IT"

  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    weight       = 2
    contentDir   = "content/en"
    [languages.en.params]
      bio       = "Designer, gamer, reader and tinkerer."
      langLabel = "EN"

# ── Parametri globali ──────────────────────────────────────────
[params]
  author    = "MSMBRC"
  handle    = ""
  location  = "Milano"
  email     = "massimiliano.barci@proton.me"
  copyright = "© 2026 MSMBRC"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[pagination]
  pagerSize = 7
