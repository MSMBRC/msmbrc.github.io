<!-- ── PROFILE HEADER ──────────────────────────────────────── -->
<div class="profile-header">

  <div class="profile-banner"></div>

  <div class="profile-meta-row">
    <div class="profile-avatar"></div>
    <div class="profile-actions"></div>
  </div>

  <div class="profile-info">
    <div class="profile-name">
      {{ .Site.Title }}
      <span class="verified-badge">✦</span>
    </div>
    <div class="profile-handle">{{ .Site.Params.handle }}</div>
    <div class="profile-bio">{{ .Site.Params.bio | safeHTML }}</div>
    <div class="profile-details">
      {{ with .Site.Params.location }}
      <span class="profile-detail-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        {{ . }}
      </span>
      {{ end }}
      {{ with .Site.Params.twitter }}
      <span class="profile-detail-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
        <a href="{{ . }}" target="_blank" rel="noopener">@MSMBRC</a>
      </span>
      {{ end }}
      {{ with .Site.Params.email }}
      <span class="profile-detail-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <a href="mailto:{{ . }}">Scrivimi</a>
      </span>
      {{ end }}
    </div>
  </div>

  <!-- Tabs di navigazione -->
  <div class="profile-tabs">
    <a href="/" class="profile-tab{{ if .IsHome }} active{{ end }}">Post</a>
  </div>

</div>
