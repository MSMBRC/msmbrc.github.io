{{ $isEn := eq .Site.Language.Lang "en" }}
{{ $posts := where .Site.RegularPages "Section" "posts" }}
{{ $latest := index ($posts.ByDate.Reverse) 0 }}

<aside class="sidebar">

  <div class="sidebar-controls">

    <a href="{{ if $latest }}{{ $latest.RelPermalink }}{{ else }}/{{ end }}" class="sidebar-avatar">
      <img src="/assets/global/profilo.jpg" alt="MSMBRC">
    </a>

    <button class="sidebar-btn lang-toggle" id="lang-toggle" aria-label="Cambia lingua">
      <span class="lang-label">{{ if $isEn }}EN{{ else }}IT{{ end }}</span>
    </button>

    <button class="sidebar-btn theme-toggle" id="theme-toggle" aria-label="Cambia tema">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>

    <button class="sidebar-btn hamburger" id="hamburger" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

  </div>

  <nav class="sidebar-posts" id="sidebar-posts">

    <button class="sidebar-close" id="sidebar-close">✕</button>

    {{ range $posts.ByDate.Reverse }}
    <a href="{{ .RelPermalink }}" class="sidebar-post-item{{ if eq $.RelPermalink .RelPermalink }} active{{ end }}">
      <span class="sidebar-post-title">{{ .Title }}</span>
      <!--<span class="sidebar-post-date">{{ .Date.Format "2 Jan 2006" }}</span>-->
    </a>
    {{ end }}

  </nav>

</aside>

<script>
(function() {
  // Theme
  var themeBtn = document.getElementById('theme-toggle');
  if (themeBtn) {
    themeBtn.addEventListener('click', function() {
      var t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('theme', t);
      var meta = document.getElementById('meta-theme-color');
      if (meta) meta.content = t === 'dark' ? '#0e0e0e' : '#faf9f7';
    });
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
      if (!localStorage.getItem('theme')) {
        document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
      }
    });
  }

  // Lang
  var langBtn = document.getElementById('lang-toggle');
  if (langBtn) {
    langBtn.addEventListener('click', function() {
      var path = window.location.pathname;
      var isEn = path.startsWith('/en/') || path === '/en';
      window.location.href = isEn ? (path.replace(/^\/en/, '') || '/') : ('/en' + (path === '/' ? '/' : path));
    });
  }

  // Hamburger
  var hamburger = document.getElementById('hamburger');
  var sidebarPosts = document.getElementById('sidebar-posts');
  var closeBtn = document.getElementById('sidebar-close');
  if (hamburger && sidebarPosts) {
    hamburger.addEventListener('click', function() {
      sidebarPosts.classList.add('open');
      document.body.style.overflow = 'hidden';
    });
    closeBtn && closeBtn.addEventListener('click', function() {
      sidebarPosts.classList.remove('open');
      document.body.style.overflow = '';
    });
  }
})();
</script>
