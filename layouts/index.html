{{ define "main" }}
{{ $posts := where .Site.RegularPages "Section" "posts" }}

<article class="post-single">
  <div class="post-single-header">
    <span class="post-single-title">{{ if eq $.Site.Language.Lang "en" }}MSMBRC{{ else }}MSMBRC{{ end }}</span>
    <span class="post-single-date"></span>
  </div>
  <div class="post-content" style="color:var(--text-secondary)">
    {{ if eq $.Site.Language.Lang "en" }}
      Hi, this is my note book.
    {{ else }}
      Ciao, questo è il mio blocco note.
    {{ end }}
  </div>
</article>
{{ end }}
