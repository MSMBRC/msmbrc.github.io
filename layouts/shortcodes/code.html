{{ $lang := .Get "lang" | default "code" }}
<div class="code-block">
  <div class="code-block-header">
    <span class="code-block-lang">{{ $lang }}</span>
    <button class="code-block-copy" onclick="
      var pre = this.closest('.code-block').querySelector('code');
      navigator.clipboard.writeText(pre.innerText).then(() => {
        this.textContent = 'copiato';
        setTimeout(() => this.textContent = 'copia', 1500);
      });
    ">copia</button>
  </div>
  <pre class="code-block-pre"><code class="code-block-code">{{ .Inner | safeHTML }}</code></pre>
</div>
