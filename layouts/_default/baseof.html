<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .IsHome }}{{ .Site.Params.bio | plainify }}{{ else }}{{ .Summary | plainify }}{{ end }}" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#008837" id="meta-theme-color" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="{{ .Site.Title }}" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="stylesheet" href="/css/main.css?v={{ now.Unix }}" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
    })();
  </script>
  {{ if .Params.robots }}<meta name="robots" content="{{ .Params.robots }}">{{ end }}
</head>
<body>
  {{- partial "header.html" . -}}
  <main class="main-content">
    {{- block "main" . }}{{- end }}
  </main>
  <script>lucide.createIcons();</script>
  <script>
    (function() {
      document.querySelectorAll('.post-content').forEach(function(container) {
        container.querySelectorAll('.highlight').forEach(function(hl) {
          if (hl.closest('.code-block')) return;
          var code = hl.querySelector('code'), lang = '';
          if (code) { var m = code.className.match(/language-(\w+)/); if (m) lang = m[1]; }
          wrap(hl, code || hl.querySelector('pre'), lang);
        });
        container.querySelectorAll('pre').forEach(function(pre) {
          if (pre.closest('.code-block') || pre.closest('.highlight')) return;
          var code = pre.querySelector('code'), lang = '';
          if (code) { var m = code.className.match(/language-(\w+)/); if (m) lang = m[1]; }
          wrap(pre, code || pre, lang);
        });
      });
      function wrap(el, codeEl, lang) {
        var w = document.createElement('div'); w.className = 'code-block';
        var h = document.createElement('div'); h.className = 'code-block-header';
        var l = document.createElement('span'); l.className = 'code-block-lang'; l.textContent = lang || 'code';
        var b = document.createElement('button'); b.className = 'code-block-copy'; b.textContent = 'copia';
        b.addEventListener('click', function() {
          navigator.clipboard.writeText(codeEl.innerText).then(function() {
            b.textContent = 'copiato'; setTimeout(function() { b.textContent = 'copia'; }, 1500);
          });
        });
        h.appendChild(l); h.appendChild(b);
        el.parentNode.insertBefore(w, el); w.appendChild(h); w.appendChild(el);
      }
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() { navigator.serviceWorker.register('/sw.js'); });
    }
  </script>
<body{{ if .IsHome }} class="is-home"{{ end }}>
</html>
