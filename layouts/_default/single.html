{{ define "main" }}

<div class="post-feed">
  <article class="post">
    <div class="post-avatar"></div>
    <div class="post-body">

      <div class="post-header">
        <div class="post-header-left">
          <span class="post-author">{{ .Site.Title }} <span class="post-author-badge">✦</span></span>
          <span class="post-handle">{{ .Site.Params.handle }}</span>
          <span class="post-dot">·</span>
          <span class="post-date">{{ .Date.Format "2 Jan 2006" }}</span>
        </div>
      </div>

      <div class="post-content">
        {{ .Content }}
      </div>

    </div>
  </article>
</div>

{{ end }}
