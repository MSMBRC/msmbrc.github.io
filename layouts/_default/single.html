{{ define "main" }}
<article class="post-single">
  <div class="post-single-header">
    <span class="post-single-title">{{ .Title }}</span>
    <span class="post-single-date">
      <span>{{ range .Params.tags }} #{{ . }} {{ end }}</span>
      <span class="onlydesktop">|</span>
      <span>{{ .Date.Format "2 Jan 2006" }}</span>
    </span>
  </div>
  <div class="post-content">{{ .Content }}</div>
</article>
{{ end }}
